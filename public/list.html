<!DOCTYPE html>
<html>
<head>
  <title>Homework Tracker</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f6ff;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #6c63ff;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      text-align: center;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    button {
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .done {
      background: #28a745;
      color: white;
    }

    .delete {
      background: #dc3545;
      color: white;
    }
  </style>
</head>


<body>

<h1>📚 ตารางการบ้าน</h1>

<table>
  <thead>
    <tr>
      <th>วิชา</th>
      <th>หัวข้อ</th>
      <th>กำหนดส่ง</th>
      <th>จัดการ</th>
    </tr>
  </thead>
  <tbody id="homeworkTable"></tbody>
</table>

<script>
const userId = "demoUser";

async function loadHomework() {
  const res = await fetch(`/homework/${userId}`);
  const data = await res.json();

  const table = document.getElementById("homeworkTable");
  table.innerHTML = "";

  data.forEach(hw => {
    table.innerHTML += `
      <tr>
        <td>${hw.subject}</td>
        <td>${hw.topic}</td>
        <td>${new Date(hw.dueDate).toLocaleDateString()}</td>
        <td>
          <button class="done" onclick="complete('${hw._id}')">ส่งแล้ว</button>
          <button class="delete" onclick="removeHW('${hw._id}')">ลบ</button>
        </td>
      </tr>
    `;
  });
}

async function complete(id) {
  await fetch(`/complete/${id}`, { method: "PUT" });
  loadHomework();
}

async function removeHW(id) {
  await fetch(`/delete/${id}`, { method: "DELETE" });
  loadHomework();
}

loadHomework();
</script>

</body>
</html>
